<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Greenhouse CMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1a6b2f" stroke-width="2" style="margin-bottom:10px"><path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12c0-2.76 1.12-5.26 2.93-7.07"/><path d="M12 12c2-2 4-3 6-2"/><path d="M12 12c-2-3-2-6 0-9"/></svg>
      <h1>Greenhouse CMS</h1>
      <p>Secure Control Interface</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>Operator Username</label>
        <input id="username" class="form-control" type="text" placeholder="e.g. admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>System Password</label>
        <input id="password" class="form-control" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="err" class="form-error"></div>
      <button class="btn btn-green btn-full mt-8" type="submit" id="submit-btn">AUTHENTICATE</button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:.72rem;color:var(--neutral-500);">
      Default: <strong>admin / admin123</strong> &nbsp;|&nbsp; <strong>student / student123</strong>
    </p>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('err');
    btn.textContent = 'AUTHENTICATING...';
    btn.disabled = true;
    err.classList.remove('show');

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      location.href = data.user.must_reset ? 'reset-password' : 'dashboard';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.textContent = 'AUTHENTICATE';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
