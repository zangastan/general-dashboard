<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - Greenhouse CMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="page-body">

      <!-- Access Denied (shown for non-admins) -->
      <div id="denied" class="access-denied hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <h2>Access Denied</h2>
        <p>You do not have permission to manage users.</p>
      </div>

      <div id="admin-content">
        <div class="page-header">
          <div><h2>User Management</h2><p>Manage operators and their permissions</p></div>
          <button class="btn btn-green" onclick="openModal()">+ CREATE USER</button>
        </div>

        <div class="table-wrap">
          <div class="table-head"><h3><span class="header-icon" id="icon-users-u"></span> System Users</h3></div>
          <table>
            <thead><tr><th>Username</th><th>Role</th><th>Email</th><th>Created</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="users-tbody"><tr class="loading-row"><td colspan="6">Loading...</td></tr></tbody>
          </table>
          <div class="table-footer">
            <div class="pagination-info" id="pag-info">Showing 0-0 of 0</div>
            <div class="pagination-btns">
              <button class="btn btn-outline btn-sm" id="prev-btn" onclick="changePage(-1)" disabled>Previous</button>
              <button class="btn btn-outline btn-sm" id="next-btn" onclick="changePage(1)" disabled>Next</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Create User Modal -->
      <div id="user-modal" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;">
        <div class="card" style="width:440px;border-radius:var(--radius-lg);">
          <div class="card-header"><h3>Create New User</h3><button onclick="closeModal()" style="background:none;border:none;font-size:1.2rem;cursor:pointer">×</button></div>
          <form id="create-form">
            <div class="form-group"><label>Username</label><input id="u-name" class="form-control" required placeholder="e.g. john_doe"></div>
            <div class="form-group"><label>Email</label><input id="u-email" class="form-control" type="email" placeholder="user@greenhouse.com"></div>
            <div class="form-group"><label>Role</label>
              <select id="u-role" class="form-control">
                <option value="1">Farm Manager (Admin)</option>
                <option value="2">Student (Operator)</option>
              </select>
            </div>
            <div class="form-group"><label>Default Password</label><input id="u-pwd" class="form-control" type="password" required minlength="6" placeholder="Min. 6 characters"></div>
            <div id="u-err" class="form-error"></div>
            <div class="d-flex gap-8" style="justify-content:flex-end;">
              <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
              <button type="submit" class="btn btn-green">CREATE USER</button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!UI.isAdmin()) {
    document.getElementById('admin-content').classList.add('hidden');
    document.getElementById('denied').classList.remove('hidden');
    return;
  }
  document.getElementById('icon-users-u').innerHTML = UI.icon.users_group;
  loadUsers();
  setInterval(loadUsers, 2000);
});

let userData = [];
let currentPage = 1;
const pageSize = 10;

async function loadUsers() {
  try {
    userData = await UI.apiFetch('/api/users');
    renderTable();
  } catch(e) { UI.toast(e.message,'error'); }
}

function renderTable() {
  const tb = document.getElementById('users-tbody');
  if (!userData.length) { tb.innerHTML='<tr class="loading-row"><td colspan="6">No users found.</td></tr>'; return; }
  
  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  const pageData = userData.slice(start, end);

  tb.innerHTML = pageData.map(u=>`<tr>
    <td class="fw-600">${u.username}</td>
    <td><span class="badge ${u.role_id===1?'badge-green':'badge-gray'}">${u.role_name}</span></td>
    <td class="text-muted">${u.email || '-'}</td>
    <td class="text-muted">${new Date(u.created_at).toLocaleDateString()}</td>
    <td><span class="badge badge-green">Active</span></td>
    <td class="d-flex gap-8">
      <button class="btn btn-outline btn-sm" onclick="resetPwd('${u.username}')">Reset Pwd</button>
      ${u.username !== 'admin' ? `<button class="btn btn-sm" style="background:var(--red-bg);color:var(--red-crit);border:1px solid #ef9a9a" onclick="deleteUser('${u.username}')">Delete</button>` : ''}
    </td>
  </tr>`).join('');

  const total = userData.length;
  document.getElementById('pag-info').textContent = `Showing ${total ? start + 1 : 0}-${Math.min(end, total)} of ${total}`;
  document.getElementById('prev-btn').disabled = currentPage === 1;
  document.getElementById('next-btn').disabled = end >= total;
}

function changePage(dir) {
  currentPage += dir;
  renderTable();
}

async function resetPwd(username) {
  const newPwd = prompt(`Enter new password for "${username}" (min 6 chars):`);
  if (!newPwd || newPwd.length < 6) return UI.toast('Password too short','error');
  try {
    await UI.apiFetch('/api/users/admin-reset', {method:'POST', body:JSON.stringify({username, newPassword: newPwd})});
    UI.toast(`Password reset for ${username}`);
  } catch(e) { UI.toast(e.message,'error'); }
}

async function deleteUser(username) {
  if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
  try {
    await UI.apiFetch('/api/users/'+username, {method:'DELETE'});
    UI.toast('User deleted'); loadUsers();
  } catch(e) { UI.toast(e.message,'error'); }
}

function openModal() { document.getElementById('user-modal').classList.remove('hidden'); }
function closeModal() { document.getElementById('user-modal').classList.add('hidden'); document.getElementById('create-form').reset(); }

document.getElementById('create-form').addEventListener('submit', async e => {
  e.preventDefault();
  const err = document.getElementById('u-err');
  err.classList.remove('show');
  try {
    await UI.apiFetch('/api/users', {method:'POST', body: JSON.stringify({
      username: document.getElementById('u-name').value.trim(),
      email:    document.getElementById('u-email').value.trim(),
      role_id:  +document.getElementById('u-role').value,
      password: document.getElementById('u-pwd').value
    })});
    UI.toast('User created successfully!');
    closeModal(); loadUsers();
  } catch(ex) { err.textContent = ex.message; err.classList.add('show'); }
});
</script>
</body>
</html>
