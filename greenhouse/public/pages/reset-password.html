<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Greenhouse CMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1a6b2f" stroke-width="2" style="margin-bottom:10px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <h1>Security Required</h1>
      <p>Change your password before continuing</p>
    </div>

    <form id="reset-form">
      <div class="form-group">
        <label>Current Password</label>
        <input id="old-password" class="form-control" type="password" placeholder="Current password" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input id="new-password" class="form-control" type="password" placeholder="Min. 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input id="confirm-password" class="form-control" type="password" placeholder="Repeat new password" required minlength="6">
      </div>
      <div id="err" class="form-error"></div>
      <button class="btn btn-green btn-full mt-8" type="submit" id="submit-btn">UPDATE PASSWORD</button>
    </form>
  </div>
</div>

<script>
  document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('err');
    const np = document.getElementById('new-password').value;
    const cp = document.getElementById('confirm-password').value;
    err.classList.remove('show');

    if (np !== cp) {
      err.textContent = 'Passwords do not match.';
      return err.classList.add('show');
    }

    btn.textContent = 'UPDATING...';
    btn.disabled = true;

    try {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: user.username,
          oldPassword: document.getElementById('old-password').value,
          newPassword: np
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Update failed');
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      alert('Password updated. Please log in again.');
      location.href = 'login';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.textContent = 'UPDATE PASSWORD';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
